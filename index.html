<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUM BREACH | 런칭 예정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #e0e0ff;
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}
.scanline {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,200,0.015) 2px, rgba(0,255,200,0.015) 4px);
  pointer-events: none;
  z-index: 0;
}
.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  background: rgba(10,10,20,0.95);
  border: 1px solid rgba(0,255,200,0.3);
  border-radius: 4px;
  padding: 3rem 2rem;
  box-shadow: 0 0 40px rgba(0,255,200,0.08), inset 0 0 40px rgba(0,255,200,0.02);
  text-align: center;
}
.corner { position: absolute; width: 12px; height: 12px; border-color: #00ffc8; border-style: solid; }
.corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
.corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
.corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
.title {
  font-family: 'Orbitron', monospace;
  font-size: 1.1rem;
  font-weight: 900;
  letter-spacing: 0.2em;
  color: #00ffc8;
  text-shadow: 0 0 20px rgba(0,255,200,0.6);
  margin-bottom: 0.3rem;
}
.subtitle { font-size: 0.7rem; letter-spacing: 0.15em; color: rgba(0,255,200,0.4); margin-bottom: 2.5rem; }
.status-icon {
  font-family: 'Orbitron', monospace;
  font-size: 2.4rem;
  color: #00ffc8;
  text-shadow: 0 0 24px rgba(0,255,200,0.7);
  margin-bottom: 1rem;
  letter-spacing: 0.1em;
}
.launch {
  font-family: 'Orbitron', monospace;
  font-size: 1.9rem;
  font-weight: 900;
  letter-spacing: 0.18em;
  color: #00ffc8;
  text-shadow: 0 0 24px rgba(0,255,200,0.6);
  margin-bottom: 0.4rem;
}
.launch-ko { font-size: 0.85rem; letter-spacing: 0.4em; color: rgba(0,255,200,0.5); margin-bottom: 2.2rem; }

.progress-wrap { margin-bottom: 2.2rem; }
.progress-label { display: flex; justify-content: space-between; font-size: 0.6rem; letter-spacing: 0.1em; color: rgba(0,255,200,0.4); margin-bottom: 0.5rem; }
.progress-track { height: 8px; border: 1px solid rgba(0,255,200,0.2); background: rgba(0,255,200,0.03); position: relative; overflow: hidden; }
.progress-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  background: linear-gradient(90deg, rgba(0,255,200,0.4), #00ffc8);
  box-shadow: 0 0 10px rgba(0,255,200,0.5);
  animation: load 2.6s ease-in-out infinite;
}
@keyframes load {
  0% { width: 8%; } 50% { width: 88%; } 100% { width: 8%; }
}

.terminal {
  border: 1px solid rgba(0,255,200,0.1);
  background: rgba(0,255,200,0.02);
  padding: 1rem;
  text-align: left;
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  color: rgba(0,255,200,0.55);
  margin-bottom: 2.2rem;
  min-height: 92px;
}
.terminal .line { margin-bottom: 0.35rem; opacity: 0; animation: typein 0.4s forwards; }
.terminal .line:nth-child(1) { animation-delay: 0.2s; }
.terminal .line:nth-child(2) { animation-delay: 0.9s; }
.terminal .line:nth-child(3) { animation-delay: 1.6s; }
.terminal .ok { color: #00ffc8; }
.cursor { display: inline-block; width: 8px; background: #00ffc8; animation: blink 1s step-end infinite; }
@keyframes typein { to { opacity: 1; } }
@keyframes blink { 50% { opacity: 0; } }

.build-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.6rem; letter-spacing: 0.1em; color: rgba(0,255,200,0.3);
  border-top: 1px solid rgba(0,255,200,0.1);
  padding-top: 1rem;
}
.build-row .val { color: rgba(0,255,200,0.7); font-family: 'Orbitron', monospace; }
</style>
</head>
<body>
<div class="scanline"></div>

<div class="container">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="title">NUM BREACH</div>
  <div class="subtitle">[ CRACK THE CODE ]</div>

  <div class="status-icon">◄ ◆ ►</div>
  <div class="launch">LAUNCHING SOON</div>
  <div class="launch-ko">런칭 예정</div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>// SYSTEM STATUS</span>
      <span>INITIALIZING</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
  </div>

  <div class="terminal">
    <div class="line">&gt; system: booting modules <span class="ok">[OK]</span></div>
    <div class="line">&gt; assets: loading interface <span class="ok">[OK]</span></div>
    <div class="line">&gt; status: awaiting launch<span class="cursor">&nbsp;</span></div>
  </div>

  <div class="build-row">
    <span>STATUS <span class="val">COMING SOON</span></span>
    <span>NUM BREACH <span class="val">v0.1</span></span>
  </div>
</div>
</body>
</html>
